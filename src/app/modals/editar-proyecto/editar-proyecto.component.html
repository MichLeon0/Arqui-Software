<div class="modal-backdrop" *ngIf="isOpen">
  <div class="modal-container">

    <div class="modal-header">
      <span>Editar Proyecto</span>
      <span class="close-btn" (click)="close()">✕</span>
    </div>

    <div class="modal-body">
      <form #editForm="ngForm">

        <div class="form-group">
          <label>Título del proyecto *</label>
          <input type="text" name="title" [(ngModel)]="project.title" required />
        </div>

        <div class="form-group">
          <label>Descripción *</label>
          <textarea name="description" rows="4" [(ngModel)]="project.description" required></textarea>
        </div>

        <div class="form-group">
          <label>URL de la imagen</label>
          <div class="input-with-icon">
            <span class="icon"></span> <input type="text" name="image" [(ngModel)]="project.image" />
          </div>
          <small>Si dejas este campo vacío, se usará una imagen por defecto</small>
        </div>

        <div class="form-group">
          <label>Link de GitHub</label>
          <div class="input-with-icon">
            <span class="icon"></span>
            <input type="text" name="github" [(ngModel)]="project.github" />
          </div>
        </div>

        <div class="form-group">
          <label>Tecnologías</label>
          <div class="tech-input-container">
            <div class="input-with-icon">
              <span class="icon"></span>
              <input type="text" name="technologies" [(ngModel)]="project.technologies"
                placeholder="Ej: React, Node.js, PostgreSQL" />
            </div>
            <button type="button" class="btn-add">Agregar</button>
          </div>
        </div>

      </form>
    </div>

    <div class="modal-footer">
      <button class="btn-discard" (click)="close()">Descartar</button>
      <button class="btn-save" (click)="guardar()" [disabled]="editForm.invalid">
        Guardar Cambios
      </button>
    </div>

  </div>
</div>
