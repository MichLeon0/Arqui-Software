<div class="layout">
  <app-sidebar [isOpen]="sidebarOpen" (close)="sidebarOpen = false"></app-sidebar>

  <div class="main" [class.shifted]="sidebarOpen">
    <app-navbar (toggleSidebar)="sidebarOpen = !sidebarOpen"></app-navbar>

    <div class="content">
      <router-outlet></router-outlet>
    </div>
    <app-agregar-proyevto
      #agregarModal
      (onSave)="agregarProyecto($event)">
    </app-agregar-proyevto>
  </div>
</div>
