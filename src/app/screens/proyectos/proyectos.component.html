<div class="layout">

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- PROJECT GRID -->
    <section class="projects-grid">

      <div class="project-card" *ngFor="let project of projects">

        <!-- IMAGE -->
        <div class="image-container">
          <img [src]="project.image" [alt]="project.title" />
          <div class="overlay"></div>

          <a *ngIf="project.githubLink"
             [href]="project.githubLink"
             target="_blank"
             class="external-link">
            🔗
          </a>
        </div>

        <!-- CONTENT -->
        <div class="content">

          <h3>{{ project.title }}</h3>

          <p class="description">
            {{ project.description }}
          </p>

          <!-- TECHNOLOGIES -->
          <div class="technologies">
            <span class="badge"
                  *ngFor="let tech of project.technologies | slice:0:3">
              {{ tech }}
            </span>

            <span class="badge more"
                  *ngIf="project.technologies.length > 3">
              +{{ project.technologies.length - 3 }}
            </span>
          </div>

          <!-- ACTIONS -->
          <div class="actions">
            <button class="btn edit" (click)="onEdit(project)">
              ✏️ Editar
            </button>

            <button class="btn delete" (click)="onDelete(project)">
              🗑
            </button>
          </div>

        </div>
      </div>

    </section>

  </div>
</div>
